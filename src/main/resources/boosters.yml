boosters:
  xp:
    display-name: "&bXP Booster"
    type: XP
    scope: GLOBAL
    multiplier: 2.0
    duration-seconds: 3600
    material: EXPERIENCE_BOTTLE
    permission: "nexusboosters.booster.xp"

  shop_sell:
    display-name: "&6Shop Sell Booster"
    type: SHOP_SELL
    scope: GLOBAL
    multiplier: 1.5
    duration-seconds: 3600
    material: GOLD_INGOT
    permission: "nexusboosters.booster.shop_sell"
    requires-hooks:
      - ShopGUIPlus

  points_reward:
    display-name: "&dPoints Reward Booster"
    type: PLAYERPOINTS_GAIN
    scope: GLOBAL
    multiplier: 1.5
    duration-seconds: 3600
    material: AMETHYST_SHARD
    permission: "nexusboosters.booster.points_reward"
    requires-hooks:
      - PlayerPoints

  mob_drops:
    display-name: "&cMob Drops Booster"
    type: MOB_DROPS
    scope: GLOBAL
    multiplier: 1.5
    duration-seconds: 3600
    material: DIAMOND_SWORD
    permission: "nexusboosters.booster.mob_drops"

  block_drops:
    display-name: "&aBlock Drops Booster"
    type: BLOCK_DROPS
    scope: GLOBAL
    multiplier: 1.5
    duration-seconds: 3600
    material: DIAMOND_PICKAXE
    permission: "nexusboosters.booster.block_drops"
